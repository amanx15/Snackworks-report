<title>Snackworks Creator Playbook</title>

<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --paper: #fafaf7;
    --paper-warm: #f0ede5;
    --line: #e5e2da;
    --grape: #5b1d96;
    --candy: #e63946;
    --sour: #f5c518;
    --lime: #6ba84f;
    --ash: #6b6b6b;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {

    overflow-x: hidden;
    font-size: 15px;
  }
  .masthead { background: var(--ink); color: var(--paper); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.02em; }
  .masthead .left, .masthead .right { display: flex; gap: 20px; }
  .masthead .center { color: rgba(250,250,247,0.7); }
  .dot { width: 5px; height: 5px; background: var(--candy); border-radius: 50%; display: inline-block; margin-right: 8px; }
  .hero { background: var(--ink); color: var(--paper); padding: 90px 32px 80px; position: relative; }
  .hero-grid { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 0.9fr 0.5fr; gap: 48px; align-items: end; }
  .hero-art { position: relative; width: 100%; height: 320px; align-self: center; cursor: pointer; }
  .hero-art svg { width: 100%; height: 100%; overflow: visible; }

  .snack:active { cursor: grabbing; }
  .snack:hover { transform: scale(1.15); }
